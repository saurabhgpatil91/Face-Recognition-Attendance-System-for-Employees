@startuml
actor User

package "3.0 Mark Attendance" {
  rectangle "3.1 Capture Face" as CF
  rectangle "3.2 Predict Identity" as PI
  rectangle "3.3 Record Attendance" as RA

  file "Trainner.yml" as TR
  database "EmpDetails.csv" as EDC
  database "Attendance.csv" as ATD

  User - -> CF
  CF - -> PI
  PI - -> TR
  PI - -> EDC
  PI - -> RA
  RA - -> ATD
}
@enduml

