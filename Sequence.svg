@startuml
actor User
participant "GUI" as GUI
participant "System" as System
participant "Camera" as Camera
participant "Recognizer" as Recognizer
participant "CSV Storage" as CSV

User -> GUI : Start Application
GUI -> System : Initialize GUI
User -> GUI : Register/Take Images
GUI -> Camera : Capture Face Images
Camera -> System : Save Images
System -> CSV : Update EmpDetails.csv

User -> GUI : Save Profile (TrainImages)
GUI -> Recognizer : Train Model
Recognizer -> System : Save Model

User -> GUI : Take Attendance
GUI -> Camera : Capture Frame
Camera -> Recognizer : Predict Face
Recognizer -> CSV : Retrieve Name
System -> CSV : Log Attendance
@enduml

