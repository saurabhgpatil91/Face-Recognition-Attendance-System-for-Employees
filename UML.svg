@startuml
class GUI {
  +window : Tk
  +setup_frames()
  +setup_buttons()
  +start()
}

class AuthManager {
  +change_password()
  +save_pass()
}

class FaceProcessor {
  +take_images()
  +train_images()
  +track_images()
  +getImagesAndLabels()
}

class DataStorage {
  +write_csv()
  +read_csv()
  +assure_path_exists()
}

GUI - -> AuthManager
GUI - -> FaceProcessor
FaceProcessor - -> DataStorage
@enduml

