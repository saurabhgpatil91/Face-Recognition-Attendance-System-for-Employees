@startuml
actor User

package "Face Recognition System" {
  rectangle "1.0 Register Employee" as RE
  rectangle "2.0 Train Model" as TM
  rectangle "3.0 Mark Attendance" as MA

  database "EmpDetails.csv" as EDC
  folder "TrainingImage/" as TI
  file "Trainner.yml" as TR
  database "Attendance.csv" as ATD

  User - -> RE
  RE - -> EDC
  RE - -> TI

  User - -> TM
  TM - -> TI
  TM - -> TR

  User - -> MA
  MA - -> TR
  MA - -> EDC
  MA - -> ATD
}
@enduml

