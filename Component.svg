@startuml
package "Face Recognition Attendance System" {
  [GUI] - -> [User Authentication]
  [GUI] - -> [Face Registration]
  [GUI] - -> [Face Recognition]
  
  [Face Registration] - -> [Camera Module]
  [Face Registration] - -> [CSV Storage]

  [Face Recognition] - -> [Recognizer (LBPH)]
  [Recognizer (LBPH)] - -> [Trained Data]
  [Face Recognition] - -> [CSV Attendance Logger]
}
@enduml

